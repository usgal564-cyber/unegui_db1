{% extends "base.html" %}

{% block title %}Нууц үг мартсан - Зарын Сайт{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-key"></i> Нууц үг сэргээх</h4>
            </div>
            <div class="card-body">
                <p class="text-muted">Бүртгэлтэй и-мэйл хаягаа оруулна уу. Бид танд нууц үг сэргээх холбоос илгээх болно.</p>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">И-мэйл хаяг</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-paper-plane"></i> Холбоос илгээх
                    </button>
                </form>
                
                <hr>
                <div class="text-center">
                    <p><a href="{{ url_for('login') }}">Буцах нэвтрэх хуудас руу</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
