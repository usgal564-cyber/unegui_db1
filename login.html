{% extends "base.html" %}

{% block title %}Нэвтрэх - Зарын Сайт{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> Нэвтрэх</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">И-мэйл</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Нууц үг</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Намайг сана</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Нэвтрэх</button>
                </form>
                <hr>
                <div class="text-center">
                    <p>Шинэ хэрэглэгч үү? <a href="{{ url_for('register') }}">Бүртгүүлэх</a></p>
                    <p><a href="{{ url_for('forgot_password') }}">Нууц үгээ мартсан?</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
